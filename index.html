<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meter Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>⚡ Meter Calculator</h1>

    <div class="video-container" style="position: relative; display: inline-block;">
        <video id="camera" autoplay playsinline webkit-playsinline muted></video>
        <div id="scanTarget" style="position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; margin-top: -30px; margin-left: -30px; border: 3px solid #e74c3c; border-radius: 4px; pointer-events: none; box-sizing: border-box; transition: border-color 0.1s;"></div>
    </div>

    <canvas id="hiddenCanvas" style="display: none;"></canvas>

    <br>
    <p id="status" style="font-weight: bold; color: #27ae60;">✅ ระบบตรวจจับพร้อมทำงาน</p>

    <div>
        <button onclick="startCamera()">📷 เปิดกล้อง</button>
        <button onclick="startMeasure()">▶️ เริ่ม</button>
        <button onclick="stopMeasure()">⏹️ หยุด</button>
        <button onclick="resetMeasure()">🔄 รีเซ็ต</button>
    </div>

    <br>

    <label>ค่ามิเตอร์ (rev/kWh)</label>
    <select id="meterConstant">
        <option value="1200" selected>1200</option>
        <option value="600">600</option>
        <option value="300">300</option>
    </select>

    <h2>⏱️ เวลา: <span id="time">0.00</span> วินาที</h2>
    <h2>🔄 รอบ: <span id="count">0</span></h2>
    <h2>⚡ กำลังไฟ: <span id="kw">0.00</span> kW</h2>

    <script src="script.js"></script>
</body>
</html>
